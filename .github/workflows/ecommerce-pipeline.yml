name: E-Commerce Complete Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

env:
  IMAGE_NAME: awsjarvis/ecommerce-devops
  HELM_VALUES: ecommerce-chart/values.yaml

jobs:

  # ══════════════════════════════════════
  # JOB 1 — Test & SonarCloud Scan
  # ══════════════════════════════════════
  test-and-scan:
    name: "🧪 Test & Quality Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Tests with Coverage
        run: |
          pytest test_app.py \
            --cov=app \
            --cov-report=xml \
            --cov-report=term \
            -v
          echo "✅ All tests passed!"

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v4.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.sources=app.py
            -Dsonar.tests=test_app.py
            -Dsonar.language=py

  # ══════════════════════════════════════
  # JOB 2 — Docker Build & Push
  # ══════════════════════════════════════
  docker-build-push:
    name: "🐳 Docker Build & Push"
    runs-on: ubuntu-latest
    needs: test-and-scan
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Image Tag
        id: tag
        run: |
          TAG=${{ github.sha }}
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "🏷️ Image tag: ${TAG}"

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker Image
        run: |
          docker build -t $IMAGE_NAME:${{ steps.tag.outputs.tag }} .
          docker tag $IMAGE_NAME:${{ steps.tag.outputs.tag }} $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ steps.tag.outputs.tag }}
          docker push $IMAGE_NAME:latest
          echo "✅ Pushed: $IMAGE_NAME:${{ steps.tag.outputs.tag }}"

  # ══════════════════════════════════════
  # JOB 3 — Update Helm Values for ArgoCD
  # ══════════════════════════════════════
  update-helm-values:
    name: "⛵ Update Helm Values"
    runs-on: ubuntu-latest
    needs: docker-build-push
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Image Tag in Helm Values
        run: |
          NEW_TAG=${{ needs.docker-build-push.outputs.image-tag }}
          echo "🔄 Updating Helm values with tag: ${NEW_TAG}"

          # Update image tag in values.yaml
          sed -i "s|tag: .*|tag: \"${NEW_TAG}\"|g" $HELM_VALUES

          # Verify change
          grep "tag:" $HELM_VALUES
          echo "✅ Helm values updated!"

      - name: Commit & Push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add $HELM_VALUES
          git diff --staged --quiet || \
            git commit -m "⛵ Helm: update image tag to ${{ needs.docker-build-push.outputs.image-tag }}"
          git push origin main
          echo "✅ ArgoCD will now detect and deploy via Helm!"
